<!DOCTYPE html>
<html>
<head>
    <title>Assignment 03 - Q2</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            border: 1px solid #ddd;
            padding: 15px;
            width: 200px;
            border-radius: 10px;
            box-shadow: 0px 0px 5px gray;
        }

        .card img {
            width: 100%;
        }
        .card:hover{
            background-color:rgb(218, 225, 248);
        }

        .price {
            color: orange;
            font-weight: bold;
        }

        .btn {
            background-color: green;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
        }

        
        .btn:hover {
            background-color: rgb(32, 18, 221);
        }
        
    </style>
</head>

<body>

<h2>Our Products</h2>

<div class="container">

    <div class="card">
        <img src="images\laptop.avif" alt="Product1">
        <h3>Product 1</h3>
        <p>High-quality product that meets your need.</p>
        <p class="price">$805.08</p>
        <button class="btn">Add to Cart</button>
    </div>

    <div class="card">
        <img src="images\bag.jpg" alt="Product2">
        <h3>Product 2</h3>
        <p>Excellent craftsmanship and durable design.</p>
        <p class="price">$11.50</p>
        <button class="btn">Add to Cart</button>
    </div>

    <div class="card">
        <img src="images\key2.png" alt="Product3">
        <h3>Product 3</h3>
        <p>Reliable and affordable choice for everyone.</p>
        <p class="price">$12.00</p>
        <button class="btn">Add to Cart</button>
    </div>

</div>

</body>
</html>
