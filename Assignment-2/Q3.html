<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body >

    <table align="center">
        <!-- <thead> -->
            <tr>
                <td colspan="6" align="center"><img src="Images/sunbeamnewactslogo.png" alt="Sunbeam" ></td>
                
            </tr>
            <tr>
                 <td colspan="6" align="center"><h2>Sunbeam Registration Form</h2></td>
            </tr>
            <!-- <tr>
                <td colspan="6"><h2>Sunbeam Registration Form</h2></td>
            </tr> -->
        <!-- </thead> -->

        <tbody>
            <!-- Video -->
            <tr>
                <td colspan="3" rowspan="10"><video src="Videos/4K - Samurai Autumn.mp4"width="500" controls></video></td>
            </tr>

            <!-- Name -->
            <tr>
                <td>Name: </td>
                <td><input type="text"></td>
            </tr>
            <!-- birthdate -->
            <tr>
                <td>BirthDate: </td>
                <td><input type="date"></td>
            </tr>
            <!-- Email -->
            <tr>
                <td>Email: </td>
                <td><input type="text"></td>
            </tr>
            <!-- Password -->
             <tr>
                <td>Password: </td>
                <td><input type="password"></td>
             </tr>
             <!-- Address -->
             <tr>
                <td>Address: </td>
                <td><textarea name="" id="" cols="" rows="4"></textarea></td>
             </tr>      
                   <!-- Gender -->
            <tr>
                <td>Gender: </td>
                <td><input type="radio" name="Gender">Male <input type="radio" name="Gender">Female</td>
            </tr>
            <!-- upload photo -->
            <tr>
                <td>Upload Photo: </td>
                <td><input type="file" accept=".jpeg,.png"></td>
            </tr>  
            <!-- Select your Course -->
             <tr>
                <td>Select your Course: </td>
                <td><select name="" id="">
                    <option value="">Select Course</option>
                    <option value="">PGCP-AC</option>
                    <option value="">PGCP-MC</option>
                    <option value="">PGCP-BDA</option>
                </select></td>
             </tr>
             <!-- Skill Set -->
             <tr>
                <td>Skill Set:</td>
                <td><input type="checkbox">Java
                <input type="checkbox">CPP
                <input type="checkbox">OS</td>
             </tr>
        </tbody>
    </table>

</body>
</html>
