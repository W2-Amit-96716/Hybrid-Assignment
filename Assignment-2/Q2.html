<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="1" width="40%" height="40%">
        <thead>
            <tr>
                <th colspan="5">A</th>
            </tr>
        </thead>

        <tbody>
            <tr align="center">
                <td rowspan="2" colspan="3">B</td>
                <td colspan="2">C</td>
            </tr>

            <tr align="center">
                <td>D</td>
                <td>E</td>
            </tr>

            <tr align="center">
                <td colspan="1" rowspan="3">F</td>
                <td colspan="4">G</td>
            </tr>

            <tr align="center">
                <td rowspan="2">H</td>
                <td rowspan="2">I</td>
                <td colspan="2">J</td>
            </tr>

            <tr align="center">
                <td colspan="2">K</td>
            </tr>

            <tr align="center">
                <td colspan="4" rowspan="2">L</td>
                <td>M</td>
            </tr>

            <tr align="center">
                <td>N</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
